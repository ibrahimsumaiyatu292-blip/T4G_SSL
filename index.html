<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment cards</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="header">
        <h2>Assessment</h2>
        <button class="add-card-btn">Add</button>
    </div>

    <div class="card grid">

    <div class="card purple">
    <div class="Card banner"></div>
    <div class="Card body">
        <p class="card-title">Assessment</p>
        <span class="card-label">79%</span>
    </div>

    <div class="card cyan">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 1</p>
        <span class="card-label">100%</span>
      </div>
    </div>

    <div class="card green">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 2</p>
        <span class="card-label">95%</span>
      </div>
    </div>
<div class="card orange">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 3</p>
        <span class="card-label">85%</span>
      </div>
    </div>

    <div class="card orange">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 4</p>
        <span class="card-label">52%</span>
      </div>
       <div class="card purple">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 5</p>
        <span class="card-label">84%</span>
      </div>
    </div>

    <div class="card cyan">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 6</p>
        <span class="card-label">97%</span>
      </div>
    
    <div class="card green">
      <div class="card-banner"></div>
      <div class="card-body">
        <p class="card-title">Assessment 7</p>
        <span class="card-label">89%</span>
      </div>
    </div>
    
</body>
</html>
